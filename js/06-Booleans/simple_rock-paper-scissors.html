<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Rock Paper Scissors Game</title>
</head>

<body>
    <p>Rock Paper Scissors</p>

    <button onclick="rockMove()">Rock</button>

    <button onclick="paperMove()">Paper</button>

    <button onclick="scissorsMove()">Scissors</button>

    <!-- sample for Math.random() -->
    <button onclick="
        console.log(Math.random());
    ">Sample</button>

    <script>
        // Math.random() this js function can generate random number from 0 - 1 ( 0 <= number < 1 )


        function rockMove() {
            const randomNumber = Math.random();

            let computerMove = '';

            if (randomNumber >= 0 && randomNumber < 1 / 3) {
                computerMove = 'Rock';
            } else if (randomNumber >= 1 / 3 && randomNumber < 2 / 3) {
                computerMove = 'Paper';
            } else if (randomNumber >= 2 / 3 && randomNumber < 1) {
                computerMove = 'Scissors';
            }

            console.log(computerMove);

            let result = '';

            if (computerMove === 'Rock') {
                result = 'Tie.';
            } else if (computerMove === 'Paper') {
                result = 'You Lose.';
            } else if (computerMove === 'Scissors') {
                result = 'You win!';
            }

            alert(`You picked Rock. Computer picked ${computerMove}. ${result}`);
        }


        function paperMove() {
            const randomNumber = Math.random();
            let computerMove = '';


            if (randomNumber >= 0 && randomNumber < 1 / 3) {
                computerMove = 'Rock';
            } else if (randomNumber >= 1 / 3 && randomNumber < 2 / 3) {
                computerMove = 'Paper';
            } else if (randomNumber >= 2 / 3 && randomNumber < 1) {
                computerMove = 'Scissors';
            }

            console.log(computerMove);
            let result = '';

            if (computerMove === 'Rock') {
                result = 'You win!';
            } else if (computerMove === 'Paper') {
                result = 'Tie.'
            } else if (computerMove === 'Scissors') {
                result = 'You lose.'
            }

            alert(`You picked Paper. Computer picked ${computerMove}. ${result}`);
        }

        function scissorsMove() {
            const randomNumber = Math.random();

            let computerMove = '';

            if (randomNumber >= 0 && randomNumber < 1 / 3) {
                computerMove = 'Rock';
            } else if (randomNumber >= 1 / 3 && randomNumber < 2 / 3) {
                computerMove = 'Paper';
            } else if (randomNumber >= 2 / 3 && randomNumber < 1) {
                computerMove = 'Scissors';
            }

            console.log(computerMove);

            let result = '';

            if (computerMove === 'Rock') {
                result = 'You Lose.';
            } else if (computerMove === 'Paper') {
                result = 'You Win!';
            } else if (computerMove === 'Scissors') {
                result = 'Tie.';
            }

            alert(`You picked Scissors. Computer picked ${computerMove}. ${result}`);
        }


        

    </script>
</body>

</html>
