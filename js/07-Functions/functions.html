<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Functions</title>
</head>
<body>

    <script>
        function greet() {
            console.log("Hello, World!");
        }
        greet();

        function greetUser(name) {

            if (!name) {
                console.log("Please provide a name.");
            } else {
                console.log(`Hello, ${name}!`);
            }

        }
        greetUser("John");
        greetUser();

    </script>
    
</body>
</html>
