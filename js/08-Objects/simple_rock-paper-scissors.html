<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Rock Paper Scissors Game</title>
  </head>
  <body>
    <button onclick="playGame('Rock')">Rock</button>
    <button onclick="playGame('Paper')">Paper</button>
    <button onclick="playGame('Scissors')">Scissors</button>
    <button onclick="resetGame()">Reset</button>

    <script>
      const score = {
        wins: 0,
        losses: 0,
        ties: 0,
      };

      function resetGame() {
        score.wins = 0;
        score.losses = 0;
        score.ties = 0;

        alert(
          `The score has been reset. Wins: ${score.wins} Losses: ${score.losses} Ties: ${score.ties}`
        );
      }

      function playGame(playerMove) {
        const computerMove = pickComputerMove();

        let result = "";

        if (playerMove === "Rock") {
          // if (computerMove === 'Rock') {
          //     result = 'Tie.';
          // } else if (computerMove === 'Paper') {
          //     result = 'You Lose.';
          // } else if (computerMove === 'Scissors') {
          //     result = 'You win!';
          // }

          computerMove === "Rock" ? result = "Tie." : 
          computerMove === "Paper" ? result = "You Lose." : 
          result = "You win!";

        } else if (playerMove === "Paper") {

          computerMove === "Rock" ? result = "You win!" : 
          computerMove === "Paper" ? result = "Tie" : 
          result = "You lose.";

        } else if (playerMove === "Scissors") {

          computerMove === "Rock" ? result = "You lose." : 
          computerMove === "Paper" ? result = "You win!" : 
          result = "Tie.";
        }

        result === "You win!" ? score.wins++ : 
        result === "You lose." ? score.losses++ : 
        score.ties++;

        alert(`You picked ${playerMove}. Computer picked ${computerMove}. ${result}
Wins: ${score.wins} Losses: ${score.losses} Ties: ${score.ties}`);
      }

      function pickComputerMove() {
        const randomNumber = Math.random();

        let computerMove = "";

        if (randomNumber >= 0 && randomNumber < 1 / 3) {
          computerMove = "Rock";
        } else if (randomNumber >= 1 / 3 && randomNumber < 2 / 3) {
          computerMove = "Paper";
        } else if (randomNumber > 2 / 3 && randomNumber < 1) {
          computerMove = "Scissors";
        }

        return computerMove;
      }
    </script>
  </body>
</html>
