<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Objects</title>
</head>
<body>
    
    <script>
        const product = {
            name: 'shoes',
            price: 500
        };

        console.log(product)
        console.log(product.name)
        console.log(product.price)

        product.name = 'car'
        console.log(product.name)

        product.house = true
        console.log(product)

        delete product.house;
        console.log(product)
    </script>
</body>
</html>
