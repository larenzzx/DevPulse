<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modern Todo List</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <h1>Modern Todo List</h1>
        <p>Learning DOM Manipulation, CRUD & Search Filter</p>
      </header>

      <div class="todo-input-section">
        <div class="input-group">
          <input
            type="text"
            id="todoInput"
            placeholder="What needs to be done?"
            class="todo-input"
          />
          <button id="addBtn" class="add-btn">
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            Add
          </button>
        </div>

        <div class="search-group">
          <input
            type="text"
            id="searchInput"
            placeholder="Search todos..."
            class="search-input"
          />
          <svg
            class="search-icon"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.35-4.35"></path>
          </svg>
        </div>
      </div>

      <div class="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="active">Active</button>
        <button class="filter-btn" data-filter="completed">Completed</button>
      </div>

      <div class="todo-stats">
        <span id="totalCount">0 items</span>
        <span id="activeCount">0 active</span>
        <span id="completedCount">0 completed</span>
      </div>

      <ul id="todoList" class="todo-list">
        <!-- Todos will be dynamically inserted here -->
      </ul>

      <div class="empty-state" id="emptyState">
        <svg
          width="64"
          height="64"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
        >
          <path d="M9 12l2 2 4-4"></path>
          <circle cx="12" cy="12" r="10"></circle>
        </svg>
        <h3>No todos yet</h3>
        <p>Add a todo to get started!</p>
      </div>

      <div class="bulk-actions">
        <button id="markAllBtn" class="bulk-btn">Mark All Complete</button>
        <button id="clearCompletedBtn" class="bulk-btn danger">
          Clear Completed
        </button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
