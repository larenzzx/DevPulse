<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      .container {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        place-items: center;
      }

      .wrapper {
        margin-top: 5rem;
        display: flex;
        justify-content: center;
      }

      .card {
        border: 1px solid red;
        padding: 1em;
        width: 350px;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
      }

      .img {
        width: 200px;
      }
    </style>
  </head>

  <body>

    <input type="text" id="input" placeholder="Input pokemon name">
    <div class="wrapper">
      <div class="container"></div>
    </div>

    <!-- <script src="pokemonList.js"></script> -->
    <script src="prac.js"></script>
  </body>
</html>
