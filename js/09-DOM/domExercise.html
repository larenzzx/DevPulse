<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM EXERCISE</title>
</head>

<style>
    button {
        cursor: pointer;
        outline: none;
        border: none;
        
    }

    .sub {
        padding-block: .5em;
        padding-inline: 1em;
        background-color: blue;
        color: white;
        border-radius: 2em;
    }
    
    .active {
        background-color: gainsboro;
        color: black;
    }

    .cal {
        background-color: green;
        color: white;
        padding-block: .5em;
        padding-inline: .8em;
        transition: .3s all ease;

        &:hover {
            background-color: black;
        }
    }

    input {
        padding: .4em;
    }

</style>


<body>

    <div>
        <p>YouTube Subscribe Button</p>
        <button class="sub">Subscribe</button>
    </div>

    <div style="margin-top: 4em;">
        <p>Amazon Shipping Calculator</p>
        <p>Orders under 40php = +10php shipping</p>
        <p>Orders over 40php = FREE shipping</p>
        <form>
            <input type="number" onkeydown="handleCostKeydown(event)" placeholder="Cost of order">
            <button type="submit" class="cal">Calculate</button>
            <p class="show"></p>
        </form>
    </div>


    <div style="margin-top: 4em;">
        <p>Rock Paper Scissors Game</p>
        <a href="simple_rock-paper-scissors.html">Click here</a>
    </div>
    

    <script>
        const sub = document.querySelector('.sub');
        const cal = document.querySelector('.cal');
        const input = document.querySelector('input');
        let showResult = document.querySelector('.show');

        // textContent and innerHTML can be used for displaying text inside the element

        /*subscribe btn*/
        // we can also make a function version for this to put on the button inside the onclick=""
        sub.addEventListener('click', () => {
            // or sub.innerHTML can get some spaces or innerText wil not get the extra spaces
            if (sub.textContent === 'Subscribe') {
                sub.textContent = 'Subscribed';
                sub.classList.add('active');
            } else {
                sub.textContent = 'Subscribe';
                sub.classList.remove('active');
            }
        });

        

        // incase na di gagana ang function when using the enter key
        function handleCostKeydown(event){
            if (event.key === 'Enter') {
                calculate();
            }
        };

        // calculate shipping
        cal.addEventListener('click', calculate);

        function calculate(e) {
            e.preventDefault();
            let value = Number(input.value);
            

            if (value < 40 && value > 0) {
                value = value + 10;
                showResult.innerHTML = `${value.toFixed(2)}php`;
            } else if (value >= 40) {
                showResult.innerHTML = `${value.toFixed(2)}php`;
            } else {
                showResult.innerHTML = 'The order is empty';
                setTimeout(() => (showResult.innerHTML = ''), 3000);
            }
        };

    </script>
</body>
</html>
