<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Rock Paper Scissors Game</title>

    <style>
      body {
        background-color: rgb(25, 25, 25);
        color: white;
      }

      .title {
        font-size: 2rem;
        font-weight: bold;
      }

      button img {
        height: 60px;
      }

      .game {
        outline: none;
        border: 2px solid white;
        border-radius: 50%;
        padding: 2em;
        background-color: transparent;
        cursor: pointer;
        margin-inline: 0.5em;
      }

      .result {
        font-size: 2rem;
      }

      .score,
      .move {
        font-size: 1.5rem;
      }

      .move img {
        height: 40px;
      }

      .move {
        margin-bottom: 2em;
      }

      .cta {
        padding: 1em 1.5em;
        background-color: white;
        border: none;
        outline: none;
        cursor: pointer;
      }
    </style>
    
  </head>
  <body>
    <p class="title">Rock Paper Scissors Game</p>
    <button class="game" onclick="playGame('rock')">
      <img src="./rock-emoji.png" alt="" />
    </button>
    <button class="game" onclick="playGame('paper')">
      <img src="./paper-emoji.png" alt="" />
    </button>
    <button class="game" onclick="playGame('scissors')">
      <img src="./scissors-emoji.png" alt="" />
    </button>
    <p class="result"></p>
    <p class="move"></p>
    <p class="score"></p>
    <button class="cta" onclick="scoreResult()">Show Score</button>
    <button class="cta" onclick="resetGame()">Reset Score</button>

    <a href="domExercise.html" style="display: block; margin-top: 5em"
      >Calculating Shipping Fee
    </a>

    <script src="./simple_rock-paper-scissors.js">
      
    </script>
  </body>
</html>
