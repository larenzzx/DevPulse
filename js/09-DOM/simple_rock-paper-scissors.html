<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Rock Paper Scissors Game</title>
  </head>
  <body>
    <p>Rock Paper Scissors Game</p>
    <button onclick="playGame('Rock')">Rock</button>
    <button onclick="playGame('Paper')">Paper</button>
    <button onclick="playGame('Scissors')">Scissors</button>
    <p class="result"></p>
    <p class="move"></p>
    <p class="score"></p>
    <button onclick="showScore()">Show Score</button>
    <button onclick="resetGame()">Reset Score</button>

    <a href="domExercise.html" style="display: block; margin-top: 5em"
      >Calculating Shipping Fee
    </a>

    <script>
      // let score = {
      //   wins: 0,
      //   losses: 0,
      //   ties: 0,
      // };

      let score = JSON.parse(localStorage.getItem('score')) || {
        wins: 0,
        losses: 0,
        ties: 0
      };

      function showScore() {
        document.querySelector(
          ".score"
        ).innerHTML = `Wins: ${score.wins}, Losses: ${score.losses}, Ties: ${score.ties}`;
      }

      function resetGame() {
        score.wins = 0;
        score.losses = 0;
        score.ties = 0;
        localStorage.removeItem('score');

        document.querySelector(".result").innerHTML = "";
        document.querySelector(".move").innerHTML = "";
        document.querySelector(
          ".score"
        ).innerHTML = `Wins: ${score.wins}, Losses: ${score.losses}, Ties: ${score.ties}`;
      }

      function playGame(playerMove) {
        const computerMove = pickComputerMove();
        let result = "";

        if (playerMove === "Rock") {
          if (computerMove === "Rock") {
            result = "Tie.";
          } else if (computerMove === "Paper") {
            result = "You Lose.";
          } else if (computerMove === "Scissors") {
            result = "You Win!";
          }
        } else if (playerMove === "Paper") {
          if (computerMove === "Rock") {
            result = "You Win!";
          } else if (computerMove === "Paper") {
            result = "Tie.";
          } else if (computerMove === "Scissors") {
            result = "You Lose.";
          }
        } else if (playerMove === "Scissors") {
          if (computerMove === "Rock") {
            result = "You Lose.";
          } else if (computerMove === "Paper") {
            result = "You Win!";
          } else if (computerMove === "Scissors") {
            result = "Tie.";
          }
        }

        if (result === "You Win!") {
          score.wins++;
        } else if (result === "You Lose.") {
          score.losses++;
        } else if (result === "Tie.") {
          score.ties++;
        }

        localStorage.setItem('score', JSON.stringify(score));

        //         alert(`You picked ${playerMove}. Computer picked ${computerMove}. ${result}
        // Wins: ${score.wins}, Losses: ${score.losses}, Ties: ${score.ties}`);
        document.querySelector(".result").innerHTML = result;
        document.querySelector(
          ".move"
        ).innerHTML = `You ${playerMove} - ${computerMove} Computer`;
        document.querySelector(
          ".score"
        ).innerHTML = `Wins: ${score.wins}, Losses: ${score.losses}, Ties: ${score.ties}`;
      }

      function matchResult() {}

      function pickComputerMove() {
        let computerMove = "";
        let number = Math.random();

        console.log(number);
        if (number >= 0 && number <= 1 / 3) {
          computerMove = "Rock";
          // console.log(computerMove);
        } else if (number >= 1 / 3 && number <= 2 / 3) {
          computerMove = "Paper";
          // console.log(computerMove);
        } else {
          computerMove = "Scissors";
          // console.log(computerMove);
        }

        return computerMove;
      }
    </script>
  </body>
</html>
