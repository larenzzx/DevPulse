<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONVERTING TO JSON SAMPLE</title>
</head>
<body>    

    <script>
        /* JSON (JavaScript Object Notation)
            - similar to JavaScript object
            - but has less features
            - syntax of json is to always use double quotes
            - you can't put function inside the json

          We use JSON
            - when we send data between computers
            - when we store data
        */
        const students = [
            {
                id: 1,
                firstName: 'Mark',
                lastName: 'Tabotabo'
            },
            {
                id: 2,
                firstName: 'Raiza',
                lastName: 'Beligolo'
            },
            {
                id: 3,
                firstName: 'Dazai',
                lastName: 'Naksu'
            },

        ];

        // built in objects of JSON

        // use to convert object into json
        const stJson = JSON.stringify(students);
        console.log(stJson);

        // used to convert json back to object
        const jsonSt = JSON.parse(stJson);
        console.log(jsonSt);
        

    </script>
</body>
</html>
