<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONVERTING TO JSON SAMPLE</title>
</head>
<body>

    <h1>Function to convert arrays to json</h1>
    

    <script>
        const students = [
            {
                id: 1,
                firstName: 'Mark',
                lastName: 'Tabotabo'
            },
            {
                id: 2,
                firstName: 'Raiza',
                lastName: 'Beligolo'
            },
            {
                id: 3,
                firstName: 'Dazai',
                lastName: 'Naksu'
            },

        ];

        const stJson = JSON.stringify(students);
        console.log(stJson);

    </script>
</body>
</html>
