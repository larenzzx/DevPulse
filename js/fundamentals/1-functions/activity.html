<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Activity: Function & Scope</title>
  </head>
  <body>
    <script>
      // === activity 1 ===
      console.log("=== ACTIVITY 1: Function Workshop ===");

      // 1: A function that takes a person's name and returns a greeting
      function greeting(name) {
        return `Hello, I am ${name}`;
      }
      console.log(greeting("rai"));

      // 2: An arrow function that calculates the area of a circle
      const calculateArea = (radius) => {
        if (radius <= 0) {
          return "Radius must be greater than zero.";
        }
        const area = Math.PI * Math.pow(radius, 2);
        return area;
      };
      const radius = 5;
      console.log(`The area of the circle is: ${calculateArea(radius)}`);

      // 3: A function with default parameters for creating a book object
      function createBook(author, title = "Windbreaker", chapters = 200) {
        return { author, title, chapters };
      }
      console.log(createBook("Jay Jo"));

      // 4: A function that uses rest parameters to find the maximum number
      function findMax(...numbers) {
        return Math.max(...numbers);
      }
      console.log(findMax(1, 2, 3, 5, 10));

      // === activity 2 ===
      console.log("=== ACTIVITY 2: Closure Challenge ===");

      // 1: Create a function that generates unique IDs (starts at 1, increments each call)
      function createIDGenerator() {
        let id = 0;
        return function () {
          id++;
          console.log(id);
          return id;
        };
      }
      const generateID = createIDGenerator();
      generateID();
      generateID();
      generateID();

      // 2: Build a simple bank account using closures (deposit, withdraw, getBalance methods)
      function createBankAccount(initialBalance = 0) {
        let balance = initialBalance;

        return {
          deposit(amount) {
            if (amount > 0) {
              balance += amount;
              console.log(`Deposited: ${amount}`);
            } else {
              console.log("Invalid deposit amount");
            }
          },
          withdraw(amount) {
            if (amount > 0 && amount <= balance) {
              balance -= amount;
              console.log(`Withdrew: ${amount}`);
            } else {
              console.log("Invalid withdraw amount");
            }
          },
          getBalance() {
            return balance;
          },
        };
      }
      const myAccount = createBankAccount(100);
      myAccount.deposit(20);
      myAccount.withdraw(10);
      console.log(myAccount.getBalance());

      // 3: Create a function that remembers how many times it's been called
      function createCounter() {
        let count = 0;
        return function () {
          count++;
          console.log(count);
          return count;
        };
      }
      const counter = createCounter();
      counter();
      counter();
      counter();
    </script>
  </body>
</html>
