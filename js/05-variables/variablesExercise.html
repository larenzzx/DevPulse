<body>


    <p>Open the console</p>


    <script>
        // 5a
        let name = "Larenz";

        // 5b
        console.log(`My name is: ${name}`);

        // 5c
        let coffee = 5;
        let bagels = 3;
        let soup = 9;

        let cost = coffee + (bagels * 2) + soup;

        // 5d
        console.log(`Cost of food: $${cost}`);

        // 5e
        let tax = cost * 0.1;

        // 5f
        console.log(`Tax (10%): $${tax}`);

        // 5g
        totalCost = cost + tax;
        console.log(`Total cost: $${totalCost}`);


    </script>
