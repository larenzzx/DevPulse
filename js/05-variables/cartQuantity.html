<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variables Exercises</title>

    <style>
        .btnWrapper {
            display: flex;
            justify-content: center;
            margin-top: 1em;
            gap: .5em;
            flex-wrap: wrap;
        }
    </style>
</head>

<body>

    <p>Cart Quantity</p>

        <button id="add">Add to Cart</button>
        <button id="plusTwo">+2</button>
        <button id="plusThree">+3</button>
        <button id="plusFour">+4</button>
        <button id="plusFive">+5</button>

        <button id="minusThree">-3</button>

        <button id="reset">Reset Cart</button>
    </div>

    <input class="cartQuantity" type="text" value="" style="margin-top: 1em;">
